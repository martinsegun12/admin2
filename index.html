<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeVault Admin</title>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060b12; color: #dde6f5; font-family: system-ui, sans-serif; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { color: #f0b429; margin-bottom: 20px; }
.login-box { max-width: 300px; margin: 100px auto; background: #101827; padding: 30px; border-radius: 16px; text-align: center; }
input { width: 100%; padding: 12px; margin: 10px 0; background: #0c1220; border: 1px solid #1a2540; border-radius: 8px; color: white; }
button { background: #f0b429; color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
table { width: 100%; border-collapse: collapse; background: #101827; border-radius: 12px; overflow: hidden; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid #1a2540; }
th { background: #0c1220; color: #f0b429; }
.error { color: #f25c5c; margin-top: 10px; }
.success { color: #0fd68a; margin-top: 10px; }
.activate-btn { background: #0fd68a; color: #000; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; }
.deactivate-btn { background: #f25c5c; color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: none; margin-left: 5px; }
.debug-box { background: #0c1220; padding: 10px; margin-bottom: 20px; border-radius: 8px; font-family: monospace; font-size: 12px; color: #0fd68a; }
</style>
</head>
<body>

<div id="loginDiv" class="login-box">
  <h2>TradeVault Admin</h2>
  <input type="password" id="adminPass" placeholder="Password">
  <button onclick="login()">Login</button>
  <div id="loginError" class="error"></div>
</div>

<div id="adminPanel" style="display:none">
  <div class="container">
    <h1>TradeVault Admin Panel</h1>
    <button onclick="logout()" style="margin-bottom:20px; background:#333">Logout</button>
    
    <div class="debug-box" id="debugInfo">
      Checking Firestore connection...
    </div>
    
    <div id="stats" style="margin-bottom:20px; padding:15px; background:#101827; border-radius:12px;">
      Loading...
    </div>
    
    <div style="overflow-x: auto;">
      <table id="usersTable">
        <thead>
          <tr><th>Email</th><th>Name</th><th>Status</th><th>Trial End</th><th>Action</th></tr>
        </thead>
        <tbody>
          <tr><td colspan="5" style="text-align:center">Loading users...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCanqzINHcJgGt_2s_6RRzPh-1BX6nzbV0",
  authDomain: "web-app-a36aa.firebaseapp.com",
  projectId: "web-app-a36aa",
  storageBucket: "web-app-a36aa.firebasestorage.app",
  messagingSenderId: "873638679873",
  appId: "1:873638679873:web:490942c8492e947b09bdc0"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const ADMIN_PASSWORD = "TradeVaultAdmin2026";

// Test Firestore connection on load
async function testFirestore() {
  const debug = document.getElementById("debugInfo");
  if (debug) {
    debug.innerHTML = "Testing Firestore connection...<br>";
    try {
      // Try to read any document
      const testRef = db.collection("users").limit(1);
      const snapshot = await testRef.get();
      debug.innerHTML += "✅ Firestore connection successful!<br>";
      debug.innerHTML += `📁 Users collection exists: ${!snapshot.empty}<br>`;
      if (!snapshot.empty) {
        snapshot.forEach(doc => {
          debug.innerHTML += `📄 Found user: ${doc.data().email || doc.id}<br>`;
        });
      } else {
        debug.innerHTML += "⚠️ No users found in Firestore. Create a user document first.<br>";
      }
    } catch (error) {
      debug.innerHTML += `❌ Firestore error: ${error.message}<br>`;
      debug.innerHTML += "🔧 Check Firestore rules. They should allow reads.<br>";
    }
  }
}

function login() {
  const pwd = document.getElementById("adminPass").value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    testFirestore();
    loadUsers();
  } else {
    document.getElementById("loginError").innerText = "Wrong password";
  }
}

function logout() {
  document.getElementById("loginDiv").style.display = "block";
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("adminPass").value = "";
}

async function loadUsers() {
  const tbody = document.querySelector("#usersTable tbody");
  const statsDiv = document.getElementById("stats");
  
  try {
    const usersRef = db.collection("users");
    const snapshot = await usersRef.get();
    
    const users = [];
    snapshot.forEach(doc => {
      users.push({ id: doc.id, ...doc.data() });
    });
    
    // Update stats
    statsDiv.innerHTML = `
      <strong>Total Users:</strong> ${users.length} &nbsp;|&nbsp;
      <strong>Active:</strong> ${users.filter(u => u.isActive === true).length}
    `;
    
    // Update table
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">❌ No users found. Create a user in Firestore first.</td></tr>';
    } else {
      tbody.innerHTML = users.map(user => `
        <tr>
          <td>${user.email || user.id}</td>
          <td>${user.name || "-"}</td>
          <td>${user.isActive === true ? '✅ Active' : '❌ Inactive'}</td>
          <td>${user.trialEnd ? new Date(user.trialEnd).toLocaleDateString() : "-"}</td>
          <td>
            <button class="activate-btn" onclick="setUserStatus('${user.id}', true)">Activate</button>
            <button class="deactivate-btn" onclick="setUserStatus('${user.id}', false)">Deactivate</button>
          </td>
        </tr>
      `).join('');
    }
  } catch (error) {
    console.error("Error loading users:", error);
    statsDiv.innerHTML = `❌ Error: ${error.message}`;
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center">❌ Firestore error: ${error.message}<br>Check your Firestore rules.</td></tr>`;
  }
}

async function setUserStatus(userId, isActive) {
  try {
    await db.collection("users").doc(userId).update({ isActive: isActive });
    alert(`User ${isActive ? "activated" : "deactivated"}!`);
    loadUsers();
  } catch (error) {
    alert(`Error: ${error.message}`);
  }
}

// Run test when page loads (before login)
testFirestore();
</script>
</body>
</html>
