<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeVault Admin Panel</title>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060b12; color: #dde6f5; font-family: system-ui, -apple-system, sans-serif; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #1a2540; flex-wrap: wrap; gap: 15px; }
h1 { color: #f0b429; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
.stat-card { background: #101827; border: 1px solid #1a2540; border-radius: 12px; padding: 15px; text-align: center; }
.stat-number { font-size: 28px; font-weight: bold; color: #f0b429; }
.stat-label { font-size: 12px; color: #7a90b0; margin-top: 5px; }
.users-table { width: 100%; border-collapse: collapse; background: #101827; border-radius: 12px; overflow-x: auto; display: block; }
.users-table th, .users-table td { padding: 12px; text-align: left; border-bottom: 1px solid #1a2540; }
.users-table th { background: #0c1220; color: #f0b429; }
.activate-btn, .deactivate-btn, .paid-btn, .extend-btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 2px; }
.activate-btn { background: #0fd68a; color: #000; }
.deactivate-btn { background: #f25c5c; color: #fff; }
.paid-btn { background: #f0b429; color: #000; }
.extend-btn { background: #4a5f80; color: #fff; }
.login-box { max-width: 300px; margin: 100px auto; background: #101827; padding: 30px; border-radius: 16px; text-align: center; }
input { width: 100%; padding: 12px; margin: 10px 0; background: #0c1220; border: 1px solid #1a2540; border-radius: 8px; color: white; }
button { background: #f0b429; color: #000; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.error { color: #f25c5c; margin-top: 10px; }
.search-box { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
.search-box input { flex: 1; max-width: 300px; margin: 0; }
.badge-active { background: #0fd68a22; color: #0fd68a; padding: 4px 8px; border-radius: 20px; font-size: 12px; display: inline-block; }
.badge-inactive { background: #f25c5c22; color: #f25c5c; padding: 4px 8px; border-radius: 20px; font-size: 12px; display: inline-block; }
.badge-trial { background: #f0b42922; color: #f0b429; padding: 4px 8px; border-radius: 20px; font-size: 12px; display: inline-block; }
.action-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
.payment-modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #101827;
  border: 1px solid #f0b429;
  border-radius: 16px;
  padding: 25px;
  z-index: 1000;
  width: 90%;
  max-width: 400px;
  display: none;
}
.payment-modal h3 { color: #f0b429; margin-bottom: 15px; }
.payment-modal input { margin-bottom: 15px; }
.payment-modal button { margin-right: 10px; }
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 999;
  display: none;
}
@media (max-width: 768px) {
  .users-table th, .users-table td { padding: 8px; font-size: 12px; }
  .action-buttons { flex-direction: column; }
}
</style>
</head>
<body>
<div id="loginDiv" class="login-box">
  <h2>TradeVault Admin</h2>
  <input type="password" id="adminPass" placeholder="Password">
  <button onclick="login()">Login</button>
  <div id="loginError" class="error"></div>
</div>
<div id="adminPanel" style="display:none">
  <div class="container">
    <div class="header">
      <h1>TradeVault Admin Panel</h1>
      <button onclick="logout()" style="background:#333">Logout</button>
    </div>
    
    <div class="stats" id="stats"></div>
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by email or name..." onkeyup="filterUsers()">
      <button onclick="exportUsers()">📥 Export Users</button>
    </div>
    
    <div style="overflow-x: auto;">
      <table class="users-table">
        <thead>
          <tr><th>Email</th><th>Name</th><th>Trial End</th><th>Paid Until</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Payment Modal -->
<div class="overlay" id="overlay"></div>
<div class="payment-modal" id="paymentModal">
  <h3>💰 Mark as Paid</h3>
  <p>User: <strong id="paymentUserName"></strong></p>
  <input type="number" id="paymentDays" placeholder="Days of access (e.g., 30)" value="30">
  <button onclick="confirmPayment()">Confirm Payment</button>
  <button onclick="closePaymentModal()">Cancel</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCanqzINHcJgGt_2s_6RRzPh-1BX6nzbV0",
  authDomain: "web-app-a36aa.firebaseapp.com",
  projectId: "web-app-a36aa",
  storageBucket: "web-app-a36aa.firebasestorage.app",
  messagingSenderId: "873638679873",
  appId: "1:873638679873:web:490942c8492e947b09bdc0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const ADMIN_PASSWORD = "TradeVaultAdmin2026";

let allUsers = [];
let selectedUserId = null;

function login() {
  const pwd = document.getElementById("adminPass").value;
  if(pwd === ADMIN_PASSWORD) {
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadUsers();
  } else {
    document.getElementById("loginError").innerText = "Wrong password";
  }
}

function logout() { location.reload(); }

async function loadUsers() {
  const usersSnap = await db.collection("users").get();
  allUsers = [];
  usersSnap.forEach(doc => {
    allUsers.push({ id: doc.id, ...doc.data() });
  });
  displayUsers(allUsers);
  updateStats();
}

function displayUsers(users) {
  const tbody = document.getElementById("usersTable");
  const now = new Date();
  
  tbody.innerHTML = users.map(u => {
    const trialEnd = u.trialEnd ? new Date(u.trialEnd) : null;
    const paidUntil = u.paidUntil ? new Date(u.paidUntil) : null;
    const isActive = u.isActive === true;
    const isTrialValid = trialEnd && trialEnd > now;
    const isPaidValid = paidUntil && paidUntil > now;
    
    let statusBadge = '';
    let statusText = '';
    if (isPaidValid) {
      statusBadge = '<span class="badge-active">✅ Active (Paid)</span>';
      statusText = 'paid';
    } else if (isActive && isTrialValid) {
      statusBadge = '<span class="badge-trial">⏳ Trial</span>';
      statusText = 'trial';
    } else {
      statusBadge = '<span class="badge-inactive">❌ Inactive</span>';
      statusText = 'inactive';
    }
    
    const trialEndStr = trialEnd ? trialEnd.toLocaleDateString() : '-';
    const paidUntilStr = paidUntil ? paidUntil.toLocaleDateString() : '-';
    
    return `
      <tr data-status="${statusText}" data-email="${(u.email || '').toLowerCase()}">
        <td>${u.email || '-'}</td>
        <td>${u.name || '-'}</td>
        <td>${trialEndStr}</td>
        <td>${paidUntilStr}</td>
        <td>${statusBadge}</td>
        <td class="action-buttons">
          <button class="paid-btn" onclick="openPaymentModal('${u.id}', '${u.email || u.name}')">💰 Mark Paid</button>
          <button class="activate-btn" onclick="toggleUser('${u.id}', true)">🔓 Activate</button>
          <button class="deactivate-btn" onclick="toggleUser('${u.id}', false)">🔒 Deactivate</button>
          <button class="extend-btn" onclick="extendTrial('${u.id}')">📅 Extend Trial</button>
        </td>
      </tr>
    `;
  }).join('');
}

function filterUsers() {
  const searchTerm = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allUsers.filter(u => 
    (u.email && u.email.toLowerCase().includes(searchTerm)) ||
    (u.name && u.name.toLowerCase().includes(searchTerm))
  );
  displayUsers(filtered);
}

function updateStats() {
  const now = new Date();
  const total = allUsers.length;
  const activePaid = allUsers.filter(u => {
    const paidUntil = u.paidUntil ? new Date(u.paidUntil) : null;
    return paidUntil && paidUntil > now;
  }).length;
  const activeTrial = allUsers.filter(u => {
    const trialEnd = u.trialEnd ? new Date(u.trialEnd) : null;
    return u.isActive && trialEnd && trialEnd > now && !(u.paidUntil && new Date(u.paidUntil) > now);
  }).length;
  const inactive = total - activePaid - activeTrial;
  
  document.getElementById("stats").innerHTML = `
    <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Total Users</div></div>
    <div class="stat-card"><div class="stat-number">${activePaid}</div><div class="stat-label">Paid Users</div></div>
    <div class="stat-card"><div class="stat-number">${activeTrial}</div><div class="stat-label">Trial Users</div></div>
    <div class="stat-card"><div class="stat-number">${inactive}</div><div class="stat-label">Inactive</div></div>
  `;
}

function openPaymentModal(userId, userName) {
  selectedUserId = userId;
  document.getElementById("paymentUserName").innerHTML = userName;
  document.getElementById("paymentModal").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function closePaymentModal() {
  selectedUserId = null;
  document.getElementById("paymentModal").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}

async function confirmPayment() {
  const days = parseInt(document.getElementById("paymentDays").value);
  if (!days || days < 1) {
    alert("Please enter valid number of days");
    return;
  }
  
  const paidUntil = new Date();
  paidUntil.setDate(paidUntil.getDate() + days);
  
  await db.collection("users").doc(selectedUserId).update({
    isActive: true,
    paidUntil: paidUntil.toISOString(),
    trialEnd: paidUntil.toISOString()
  });
  
  alert(`✅ User activated for ${days} days!`);
  closePaymentModal();
  loadUsers();
}

async function toggleUser(uid, activate) {
  const action = activate ? "activate" : "deactivate";
  if(confirm(`Are you sure you want to ${action} this user?`)) {
    await db.collection("users").doc(uid).update({ isActive: activate });
    loadUsers();
  }
}

async function extendTrial(uid) {
  const days = prompt("How many extra trial days?", "7");
  if(days && parseInt(days) > 0) {
    const userDoc = await db.collection("users").doc(uid).get();
    const currentTrialEnd = userDoc.data().trialEnd ? new Date(userDoc.data().trialEnd) : new Date();
    const newTrialEnd = new Date(currentTrialEnd);
    newTrialEnd.setDate(newTrialEnd.getDate() + parseInt(days));
    await db.collection("users").doc(uid).update({
      trialEnd: newTrialEnd.toISOString(),
      isActive: true
    });
    alert(`Trial extended by ${days} days!`);
    loadUsers();
  }
}

function exportUsers() {
  const data = allUsers.map(u => ({
    Email: u.email,
    Name: u.name,
    TrialEnd: u.trialEnd,
    PaidUntil: u.paidUntil,
    IsActive: u.isActive,
    CreatedAt: u.createdAt
  }));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `tradevault_users_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
